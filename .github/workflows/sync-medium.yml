name: Sync Medium Posts

on:
  # Run on the 1st of every month at 09:00 UTC
  schedule:
    - cron: "0 9 1 * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser html2text

      - name: Sync Medium posts
        run: python .github/scripts/sync_medium.py

      - name: Commit and push new posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          if git diff --staged --quiet; then
            echo "No new posts to commit."
          else
            git commit -m "sync: import new Medium posts [skip ci]"
            git push
          fi
